behaviors:
  FlyToTarget:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024   
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 10
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000000
    time_horizon: 256
    summary_freq: 50000

environment_parameters:
  lesson:
    curriculum:
      - name: Lesson1_Obstacles_Difficulty1
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 5  
          min_lesson_length: 100000
        value: 0.0
      - name: Lesson2_Obstacles_Difficulty2
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 4 
          min_lesson_length: 100000
        value: 1.0
      - name: Lesson3_Obstacles_Difficulty3
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 3
          min_lesson_length: 100000
        value: 2.0
      - name: Lesson4_Obstacles_Difficulty4
        value: 3.0