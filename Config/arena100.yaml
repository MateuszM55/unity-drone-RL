behaviors:
  FlyToTarget:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048   
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 10
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000000
    time_horizon: 256
    summary_freq: 50000

environment_parameters:
  lesson:
    curriculum:
      - name: Lesson0_Clear_SpawnDistance1
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 4.2 
          min_lesson_length: 5000
        value: 0.0
      - name: Lesson1_Clear_SpawnDistance2
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 3.5  
          min_lesson_length: 5000
        value: 1.0
      - name: Lesson2_Clear_SpawnDistance3
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 2.8
          min_lesson_length: 5000
        value: 2.0
      - name: Lesson3_Clear_SpawnDistance4
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 2.0
          min_lesson_length: 5000
        value: 3.0
      - name: Lesson4_Clear_SpawnDistance5
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 1.2
          min_lesson_length: 5000
        value: 4.0
      - name: Lesson5_Obstacles_Difficulty1
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 0.5  
          min_lesson_length: 8000
        value: 5.0
      - name: Lesson6_Obstacles_Difficulty2
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: -0.5 
          min_lesson_length: 10000
        value: 6.0
      - name: Lesson7_Obstacles_Difficulty3
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: -1.5
          min_lesson_length: 10000
        value: 7.0
      - name: Lesson8_Obstacles_Difficulty4
        value: 8.0