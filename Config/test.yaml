behaviors:
  FlyToTarget:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000000
    time_horizon: 256
    summary_freq: 10000


environment_parameters:
  lesson:
    curriculum:
      - name: Lesson0_Landing
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 0.7
          min_lesson_length: 100
        value: 0.0
      - name: Lesson1_Navigation
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 0.8
          min_lesson_length: 100
        value: 1.0
      - name: Lesson2_FarNavigation
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 1.5
          min_lesson_length: 100
        value: 2.0
      - name: Lesson3_Obstacles
        completion_criteria:
          measure: reward
          behavior: FlyToTarget
          threshold: 1.2
          min_lesson_length: 100
        value: 3.0
      - name: Lesson4_FarObstacles
        value: 4.0