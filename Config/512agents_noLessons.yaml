behaviors:
  FlyToTarget:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048        
      buffer_size: 133120         
      learning_rate: 0.0003     
      learning_rate_schedule: linear
      beta: 0.0005                
      beta_schedule: linear  
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 1              
    network_settings:
      normalize: True           
      hidden_units: 512         
      num_layers: 3            
    reward_signals:
      extrinsic:
        gamma: 0.99             
        strength: 1.0
    keep_checkpoints: 3
    max_steps: 100000000         
    time_horizon: 256           
    summary_freq: 100000